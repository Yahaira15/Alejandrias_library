<div class="main">

  <h2>Tus foros</h2>

  <div class="foros-container">

    <div class="foro-card" *ngFor="let foro of foros">

      <h3>{{ foro.foro_titulo }}</h3>

      <p class="categoria">
        {{ foro.categoria?.categoria_nombre }}
      </p>

      <p class="descripcion">
        {{ foro.foro_descripcion }}
      </p>

    </div>

  </div>

</div>
