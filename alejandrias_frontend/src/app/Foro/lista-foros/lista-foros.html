<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">Alejandría’s Library</h2>

    <nav>
      <a>🏠 Inicio</a>
      <a>📚 Mis foros</a>
      <a>🎯 Logros</a>
      <a>➕ Crear foro</a>
    </nav>

    <div class="logout">
      ⬅️ Cerrar sesión
    </div>
  </aside>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- TOPBAR -->
    <header class="topbar">
      <input type="text" placeholder="🔍 Buscar" />
      <div class="user">
        🔔 Apodo 👤
      </div>
    </header>

    <!-- SECCIÓN -->
    <section>
      <h2>Tus foros</h2>

      <div class="foros-container">
        <div class="foro-card" *ngFor="let foro of foros">
          <h3>{{ foro.foro_titulo }}</h3>
          <p>{{ foro.categoria?.categoria_nombre }}</p>
          <p>{{ foro.foro_descripcion }}</p>

          <div class="buttons">
            <button (click)="editarForo(foro.foro_id)">Editar</button>
            <button (click)="eliminarForo(foro.foro_id)">Eliminar</button>
          </div>
        </div>
      </div>
    </section>

  </div>
</div>
