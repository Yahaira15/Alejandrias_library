<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">Alejandría's <br>
       Library</h2>

    <nav>
      <button><img src="iconos/home.png" alt="home" width="20px"> Inicio</button>
      <button><img src="iconos/mis_foros.png" alt="mis_foros" width="20px"> Mis foros</button>
      <button><img src="iconos/logros.png" alt="logros" width="20px"> Logros</button>
      <button (click)="irAChatIa()"><img src="iconos/notificaciones.png" alt="chat_ia" width="20px"> Chat IA</button>
      <button *ngIf="rol === 'lider'" (click)="irACrearForo()"><img src="iconos/crear_foro.png" alt="crear_foro" width="20px"> Crear foro</button>
    </nav>

    <div class="logout">
      <img src="iconos/salida.png" alt="salida" width="30px">
      <button (click)="logout()" class="logout">Cerrar<br>sesión</button>
    </div>
  </aside>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- TOPBAR -->
    <header class="topbar">
      <input type="text" placeholder="Buscar" />
      <div class="user">
        <img src="iconos/notificaciones.png" alt="notificaciones" width="35px">
          <p>{{ apodoUsuario }}</p>
         <img [routerLink]="['/perfil']" src="iconos/foto_perfil.png" alt="Foto de perfil" width="35px">
      </div>
    </header>

    <!-- SECCIÓN -->
    <section>
      <h2>Tus foros</h2>

      <div class="foros-container">
        <div class="foro-card" *ngFor="let foro of foros">
          <h3>{{ foro.foro_titulo }}</h3>
          <p>{{ foro.categoria?.categoria_nombre }}</p>
          <p>{{ foro.foro_descripcion }}</p>
          <p>Publicaciones: {{ foro.publicaciones_count || 0 }}</p>
          <p>Comentarios: {{ foro.comentarios_count_total || 0 }}</p>

          <a [routerLink]="['/foros', foro.foro_id]" class="btn-ver-foro">
            Ver foro
          </a>

          <div class="buttons" *ngIf="rol === 'lider'">
            <button (click)="editarForo(foro.foro_id)">Editar</button>
            <button (click)="eliminarForo(foro.foro_id)">Eliminar</button>
          </div>
        </div>
      </div>
    </section>

  </div>
</div>
