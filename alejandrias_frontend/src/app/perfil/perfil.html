<div class="perfil-container">

  <div class="perfil-card">

    <h2>Mi Perfil</h2>

    <!-- MODO LECTURA -->
    <div *ngIf="!modoEdicion">

      <p><strong>Nombre:</strong> {{ perfil.usuario_nombre }}</p>
      <p><strong>Apodo:</strong> {{ perfil.usuario_apodo }}</p>
      <p><strong>Email:</strong> {{ perfil.usuario_email }}</p>

      <button (click)="toggleEditar()">Editar perfil</button>

    </div>

    <!-- MODO EDICIÓN -->
    <div *ngIf="modoEdicion" class="edit-form">

      <input [(ngModel)]="perfil.usuario_nombre" placeholder="Nombre">
      <input [(ngModel)]="perfil.usuario_apodo" placeholder="Apodo">
      <input [(ngModel)]="perfil.usuario_email" placeholder="Email">

      <input 
        [type]="mostrarPassword ? 'text' : 'password'"
        [(ngModel)]="passwordNueva"
        placeholder="Nueva contraseña">

      <input 
        [type]="mostrarPassword ? 'text' : 'password'"
        [(ngModel)]="confirmarPassword"
        placeholder="Confirmar contraseña">

      <label class="checkbox">
        <input type="checkbox" [(ngModel)]="mostrarPassword">
        Mostrar contraseña
      </label>

      <p class="error" *ngIf="errorPassword">
        {{ errorPassword }}
      </p>

      <div class="buttons">
        <button (click)="actualizar()">Guardar</button>
        <button (click)="toggleEditar()">Cancelar</button>
      </div>

    </div>

    <!-- MENSAJE -->
    <p class="mensaje">{{ mensaje }}</p>

    <!-- ELIMINAR -->
    <button class="delete-btn" (click)="eliminarCuenta()">
      Eliminar cuenta
    </button>

  </div>

</div>
