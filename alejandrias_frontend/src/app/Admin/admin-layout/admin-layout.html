<div class="admin-shell">
  <aside class="admin-sidebar">
    <h1>Alejandria's<br>Library</h1>
    <nav>
      <a *ngIf="esAdmin" routerLink="/admin/usuarios" routerLinkActive="active"><img src="menuAdmin/usuarios.png" alt="">Usuarios</a>
      <a *ngIf="esAdmin" routerLink="/admin/foros" routerLinkActive="active"><img src="menuAdmin/foros.png" alt="">Foros</a>
      <a *ngIf="esAdmin" routerLink="/admin/categorias" routerLinkActive="active"><img src="menuAdmin/categorias.png" alt="">Categorias</a>
      <a *ngIf="esAdmin" routerLink="/admin/publicaciones" routerLinkActive="active"><img src="menuAdmin/publicaciones.png" alt="">Publicaciones</a>
      <a *ngIf="esAdmin" routerLink="/admin/comentarios" routerLinkActive="active"><img src="menuAdmin/comentarios.png" alt="">Comentarios</a>
      <a routerLink="/admin/moderacion" routerLinkActive="active"><img src="menuAdmin/reportes.png" alt="">Moderacion IA</a>
      <a *ngIf="esAdmin" routerLink="/admin/reportes" routerLinkActive="active"><img src="menuAdmin/reportes.png" alt="">Reportes</a>
      <a *ngIf="esAdmin" routerLink="/admin/sanciones" routerLinkActive="active"><img src="menuAdmin/sanciones.png" alt="">Sanciones</a>
      <a routerLink="/foros"><img src="menuAdmin/ir_a_foros.png" alt="">Ir a foros</a>
    </nav>
    <button type="button" (click)="logout()">
      <img src="iconos/salida.png" alt="">
      <span>Cerrar<br>Sesion</span>
    </button>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div class="admin-topbar-spacer"></div>

      <div class="admin-notifications">
        <button
          type="button"
          class="notification-trigger"
          aria-label="Notificaciones"
          (click)="toggleNotificaciones()">
          <img src="iconos/notificaciones.png" alt="" width="24" height="24">
          <span *ngIf="cantidadNoLeidas > 0" class="notification-badge">
            {{ cantidadNoLeidas }}
          </span>
        </button>

        <section *ngIf="mostrarPanelNotificaciones" class="notification-panel">
          <div class="notification-panel-header">
            <h2>Notificaciones</h2>
            <button type="button" (click)="cargarNotificaciones()">Actualizar</button>
          </div>

          <p *ngIf="cargandoNotificaciones" class="notification-empty">Cargando notificaciones...</p>
          <p *ngIf="errorNotificaciones" class="notification-error">{{ errorNotificaciones }}</p>
          <p
            *ngIf="!cargandoNotificaciones && !errorNotificaciones && notificaciones.length === 0"
            class="notification-empty">
            No tienes notificaciones
          </p>

          <button
            *ngFor="let notificacion of notificaciones"
            type="button"
            class="notification-item"
            [class.unread]="!notificacion.notificacion_leida"
            (click)="abrirNotificacion(notificacion)">
            <span class="notification-type">
              {{ notificacion.notificacion_tipo }}
            </span>
            <span class="notification-text">
              {{ notificacion.notificacion_contenido }}
            </span>
            <span class="notification-date">
              {{ obtenerTiempo(notificacion.notificacion_fecha) }}
            </span>
            <span
              *ngIf="!notificacion.notificacion_leida"
              class="notification-mark"
              (click)="marcarComoLeida(notificacion); $event.stopPropagation()">
              Marcar leida
            </span>
          </button>
        </section>
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
