<section class="admin-card">
  <header class="admin-header">
    <div>
      <p>Panel de administracion</p>
      <h2>{{ config.titulo }}</h2>
    </div>
    <button type="button" class="admin-new-button" (click)="nuevo()">Agregar</button>
  </header>

  <form *ngIf="mostrandoFormulario" class="admin-form" (ngSubmit)="guardar()">
    <ng-container *ngFor="let field of config.fields">
      <label [class.full]="field.type === 'textarea'" [class.image-label]="field.type === 'image'">
        <span>{{ field.label }}</span>

        <textarea
          *ngIf="field.type === 'textarea'"
          [(ngModel)]="formulario[field.key]"
          [name]="field.key"
          [required]="esRequerido(field)"
          [placeholder]="field.placeholder || ''"
        ></textarea>

        <select
          *ngIf="field.type === 'select'"
          [(ngModel)]="formulario[field.key]"
          [name]="field.key"
          [required]="esRequerido(field)"
        >
          <option value="">Seleccionar</option>
          <option *ngFor="let option of field.options || []" [ngValue]="option.value">{{ option.label }}</option>
        </select>

        <input
          *ngIf="field.type !== 'textarea' && field.type !== 'select' && field.type !== 'checkbox' && field.type !== 'image'"
          [type]="field.type || 'text'"
          [(ngModel)]="formulario[field.key]"
          [name]="field.key"
          [required]="esRequerido(field)"
          [placeholder]="field.placeholder || ''"
        >

        <button *ngIf="field.type === 'image'" type="button" class="upload-box" (click)="imageInput.click()">
          <input #imageInput type="file" accept="image/png,image/jpeg,image/webp" hidden (change)="seleccionarImagen($event, field)">
          <img *ngIf="previewImagenes[field.key]; else uploadText" [src]="imagenUrl(previewImagenes[field.key])" alt="Vista previa">
          <ng-template #uploadText>
            <span>Carga tu imagen aqui en<br>formato jpg, png</span>
          </ng-template>
        </button>

        <input
          *ngIf="field.type === 'checkbox'"
          type="checkbox"
          [(ngModel)]="formulario[field.key]"
          [name]="field.key"
        >

        <small *ngIf="field.helpText">{{ field.helpText }}</small>
      </label>
    </ng-container>

    <div class="admin-actions">
      <button type="submit" class="primary-action" [disabled]="guardando">{{ guardando ? 'Guardando...' : (editandoId ? 'Actualizar' : 'Agregar') }}</button>
      <button type="button" class="secondary-action" (click)="cancelar()">Cancelar</button>
    </div>
  </form>

  <p class="admin-message" *ngIf="mensaje">{{ mensaje }}</p>
  <p class="admin-error" *ngIf="error">{{ error }}</p>

  <div class="table-panel">
    <div class="panel-tabs">
      <button type="button" class="tab active">{{ config.recurso | titlecase }}</button>
    </div>
    <div class="table-search">
      <label>
        <span>Busqueda</span>
        <input
          type="search"
          [(ngModel)]="busqueda"
          (ngModelChange)="cambiarBusqueda()"
        >
      </label>
    </div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th *ngFor="let columna of columnas">{{ columna.label }}</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="cargando">
          <td [attr.colspan]="columnas.length + 2">Cargando...</td>
        </tr>
        <tr *ngIf="!cargando && pagina.length === 0">
          <td [attr.colspan]="columnas.length + 2">No hay registros.</td>
        </tr>
        <tr *ngFor="let registro of pagina">
          <td>{{ registro[config.idKey] }}</td>
          <td *ngFor="let columna of columnas">
            <img *ngIf="columna.type === 'image' && registro[columna.key]" class="table-image" [src]="imagenUrl(registro[columna.key])" alt="">
            <span *ngIf="columna.type !== 'image' || !registro[columna.key]">{{ valorCelda(registro, columna) }}</span>
          </td>
          <td class="row-actions">
            <button type="button" (click)="editar(registro)">Editar</button>
            <button type="button" class="danger" (click)="eliminar(registro)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <footer class="pagination">
    <span>{{ filtrados.length }} registros</span>
    <div>
      <button type="button" (click)="cambiarPagina(-1)" [disabled]="paginaActual === 1">Anterior</button>
      <strong>{{ paginaActual }} / {{ totalPaginas }}</strong>
      <button type="button" (click)="cambiarPagina(1)" [disabled]="paginaActual === totalPaginas">Siguiente</button>
    </div>
  </footer>
</section>
